ai_usage_summary: |
  Used Gemini via Antigravity agent SDK for research, analysis of the candidate pool, design, coding of the ranking algorithm, and validation.
  No candidate data was sent to any hosted LLM service during the ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid ranking system combining structured feature scoring and TF-IDF semantic alignment.
  Honeypots are explicitly filtered out using date-inconsistency checks (working at startups like Krutrim and Sarvam AI before their 2023 founding) and duration checks (skills with expert proficiency but 0 duration).
  Disqualifiers penalize candidates with whole-career consulting backgrounds or non-technical roles.
  The scoring model evaluates years of experience (ideal range 5-9 years), title alignment, and core/nice-to-have skills (weighted by proficiency and duration to prevent keyword stuffing).
  A multiplicative multiplier weights location (Pune/Noida preferred, relocations accepted), notice period (sub-30 days preferred), and behavioral signals (inactivity, response rate, open-to-work flag).
  The ranking is sorted by combined score descending, with ties broken by candidate ID ascending.
  The reasoning is constructed programmatically, referencing specific facts and concerns from the candidate profile without any hallucination.

